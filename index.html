<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سیستەمی تەواوەتی دکتۆر ئایتی</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: Tahoma; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-buttons { margin-bottom: 20px; }
    </style>
</head>
<body class="p-4">

<!-- لۆگین -->
<div id="login-section" class="container" style="max-width:400px;">
    <div class="card text-center"><h3>چوونەژوورەوە</h3>
    <input type="text" id="user" class="form-control mb-2" placeholder="بەکارهێنەر (mustafa یان staff)">
    <input type="password" id="pass" class="form-control mb-2" placeholder="پاسۆرد">
    <button class="btn btn-primary w-100" onclick="login()">چوونەژوورەوە</button></div>
</div>

<!-- ئەپەکە -->
<div id="main-app" class="d-none container">
    <div class="nav-buttons">
        <button class="btn btn-outline-primary" onclick="show('sales-sec')">فرۆشتن</button>
        <button id="admin-tab" class="btn btn-outline-warning d-none" onclick="show('admin-sec')">ژووری بەڕێوەبردن</button>
    </div>
    
    <!-- فرۆشتن -->
    <div id="sales-sec" class="mt-4">
        <input type="text" id="searchInput" class="form-control mb-2" placeholder="گەڕان بەدوای کاڵادا..." onkeyup="render()">
        <div class="row">
            <div class="col-md-6"><div class="card"><h5>مۆبایل</h5><select id="mobileList" class="form-control mb-2" size="5"></select><button class="btn btn-primary w-100" onclick="sell('mobileList')">فرۆشتن</button></div></div>
            <div class="col-md-6"><div class="card"><h5>ئێکسسوارات</h5><select id="accList" class="form-control mb-2" size="5"></select><button class="btn btn-info w-100" onclick="sell('accList')">فرۆشتن</button></div></div>
        </div>
        <input type="text" id="custName" class="form-control" placeholder="ناوی کڕیار">
        <select id="payType" class="form-control mt-2"><option value="نەقد">نەقد</option><option value="قەرز">قەرز</option></select>
    </div>

    <!-- ژووری بەڕێوەبردن -->
    <div id="admin-sec" class="d-none mt-4 card">
        <h4>ژووری بەڕێوەبردن</h4>
        <div class="row">
            <div class="col-md-6">
                <h5>زیادکردنی کاڵا</h5>
                <input type="text" id="pName" class="form-control mb-1" placeholder="ناو">
                <input type="number" id="pPrice" class="form-control mb-1" placeholder="نرخ">
                <select id="pCat" class="form-control mb-2"><option value="مۆبایل">مۆبایل</option><option value="ئێکسسوارات">ئێکسسوارات</option></select>
                <button class="btn btn-success w-100" onclick="addProduct()">زیادکردن</button>
            </div>
            <div class="col-md-6">
                <h5>تۆمارکردنی خەرجی</h5>
                <input type="text" id="expName" class="form-control mb-1" placeholder="ناوی خەرجی">
                <input type="number" id="expPrice" class="form-control mb-1" placeholder="بڕی پارە">
                <button class="btn btn-danger w-100" onclick="addExpense()">زیادکردنی خەرجی</button>
            </div>
        </div>
        <hr>
        <button class="btn btn-dark w-100 mb-3" onclick="closeDay()">داخستنی ڕۆژ و ژماردنی قاسە</button>
        <h5>قەرزداران</h5><div id="debtList"></div>
        <hr><h5>مێژووی فرۆشتن</h5>
        <table class="table"><thead><tr><th>کاڵا</th><th>نرخ</th><th>جۆر</th></tr></thead><tbody id="historyTable"></tbody></table>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('products')) || [];
    let sales = JSON.parse(localStorage.getItem('sales')) || [];
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

    function login() {
        let u = document.getElementById('user').value;
        if(u === "mustafa" || u === "staff") {
            document.getElementById('login-section').classList.add('d-none');
            document.getElementById('main-app').classList.remove('d-none');
            if(u === "mustafa") document.getElementById('admin-tab').classList.remove('d-none');
            render();
        } else alert("زانیاری هەڵەیە!");
    }

    function render() {
        let q = document.getElementById('searchInput').value.toLowerCase();
        let filtered = products.filter(p => p.name.toLowerCase().includes(q));
        document.getElementById('mobileList').innerHTML = filtered.filter(p => p.cat === 'مۆبایل').map(p => `<option value="${p.price}">${p.name} - ${p.price}$</option>`).join('');
        document.getElementById('accList').innerHTML = filtered.filter(p => p.cat === 'ئێکسسوارات').map(p => `<option value="${p.price}">${p.name} - ${p.price}$</option>`).join('');
        document.getElementById('historyTable').innerHTML = sales.map(s => `<tr><td>${s.item}</td><td>${s.total}$</td><td>${s.type}</td></tr>`).join('');
        document.getElementById('debtList').innerHTML = sales.filter(s => s.type === 'قەرز').map(s => `<div>${s.cust}: ${s.total}$</div>`).join('');
    }

    function addProduct() {
        products.push({name: document.getElementById('pName').value, price: document.getElementById('pPrice').value, cat: document.getElementById('pCat').value});
        localStorage.setItem('products', JSON.stringify(products)); render();
    }

    function addExpense() {
        expenses.push({name: document.getElementById('expName').value, price: document.getElementById('expPrice').value});
        localStorage.setItem('expenses', JSON.stringify(expenses)); render();
        alert("خەرجی تۆمارکرا");
    }

    function sell(listId) {
        let el = document.getElementById(listId);
        if(!el.value) return alert("کاڵایەک هەڵبژێرە");
        sales.push({item: el.options[el.selectedIndex].text, total: el.value, type: document.getElementById('payType').value, cust: document.getElementById('custName').value || "کڕیار"});
        localStorage.setItem('sales', JSON.stringify(sales));
        render(); alert("تۆمارکرا!");
    }

    function closeDay() {
        let cash = sales.filter(s => s.type === 'نەقد').reduce((s, x) => s + parseFloat(x.total), 0);
        let exp = expenses.reduce((s, x) => s + parseFloat(x.price), 0);
        alert("داهاتی نەقد: " + cash + "$ | کۆی خەرجی: " + exp + "$ | پارەی قاسە: " + (cash - exp) + "$");
    }

    function show(id) {
        document.getElementById('sales-sec').classList.add('d-none');
        document.getElementById('admin-sec').classList.add('d-none');
        document.getElementById(id).classList.remove('d-none');
    }
</script>
</body>
</html>
